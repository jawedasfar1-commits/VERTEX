<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OS // Deployment Matrix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        /* Dynamic Theme Variables */
        :root {
            --bg-color: #000000;
            --text-primary: #ffffff;
            --text-secondary: #666666;
            --border-color: #1a1a1a;
            --accent-red: #ff0033;
            --widget-bg: rgba(10, 10, 10, 0.75);
            --glyph-on: #ffffff;
            --canvas-base: #141414;
            --canvas-highlight: #444444;
        }

        body.light-mode {
            --bg-color: #f5f5f5;
            --text-primary: #000000;
            --text-secondary: #888888;
            --border-color: #d0d0d0;
            --accent-red: #d90000;
            --widget-bg: rgba(255, 255, 255, 0.75);
            --glyph-on: #000000;
            --canvas-base: #e0e0e0;
            --canvas-highlight: #a0a0a0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Space Grotesk', sans-serif;
            padding: 2rem 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        /* Boot Sequence Overlay */
        #boot-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000;
            color: #fff;
            z-index: 9999;
            font-family: 'Courier Prime', monospace;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        #boot-text {
            font-size: 0.85rem;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        /* Matrix Dot Background */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .container {
            max-width: 480px;
            width: 100%;
            border: 1px solid var(--border-color);
            padding: 2.5rem 2rem;
            border-radius: 32px;
            position: relative;
            background: var(--widget-bg);
            backdrop-filter: blur(20px);
            z-index: 2;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2);
            transition: all 0.5s ease;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.8s ease forwards;
            animation-delay: 2.5s; /* Sync with boot screen */
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Top Bar & Theme Switcher */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .theme-switch {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-family: 'Courier Prime', monospace;
            font-size: 0.65rem;
            padding: 6px 12px;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .theme-switch:hover {
            background: var(--text-primary);
            color: var(--bg-color);
        }

        /* Glyph Interface */
        .glyph-stripes {
            display: flex;
            gap: 4px;
        }
        .glyph-bar {
            width: 12px; height: 3px;
            background-color: var(--text-secondary);
            transition: all 0.3s ease;
        }
        .glyph-bar.active {
            background-color: var(--glyph-on);
            box-shadow: 0 0 8px var(--glyph-on);
        }

        .matrix-header {
            font-family: 'Courier Prime', monospace;
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 400;
            line-height: 1.05;
            margin-bottom: 0.25rem;
            letter-spacing: -1.5px;
        }

        .version-tag {
            font-family: 'Courier Prime', monospace;
            color: var(--accent-red);
            font-size: 0.85rem;
            margin-bottom: 2rem;
        }

        /* Widgets Grid */
        .widgets-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .widget {
            background-color: transparent;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: border-color 0.5s;
        }

        .widget-large {
            grid-column: span 2;
            flex-direction: row;
            align-items: center;
        }

        .widget-label {
            font-family: 'Courier Prime', monospace;
            font-size: 0.65rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .widget-value {
            font-size: 1.2rem;
            font-weight: 400;
        }

        .qr-wrapper {
            background: #ffffff;
            padding: 6px;
            border-radius: 8px;
        }

        .download-btn {
            display: block; width: 100%;
            background-color: var(--text-primary);
            color: var(--bg-color);
            text-align: center;
            padding: 1.2rem;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 700; font-size: 1.1rem;
            transition: transform 0.2s, background-color 0.5s;
            margin-bottom: 2rem;
        }
        .download-btn:hover { transform: scale(1.02); }

        /* Terminal Console Changelog */
        .console-window {
            background: rgba(0,0,0,0.1);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem;
            font-family: 'Courier Prime', monospace;
            font-size: 0.8rem;
            color: var(--text-primary);
            min-height: 100px;
            margin-bottom: 2rem;
        }
        
        .console-header {
            font-size: 0.65rem;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .cursor-blink {
            display: inline-block;
            width: 8px; height: 12px;
            background-color: var(--text-primary);
            animation: blink 1s infinite;
            vertical-align: middle;
            margin-left: 5px;
        }

        @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }

        footer {
            font-family: 'Courier Prime', monospace;
            font-size: 0.65rem;
            color: var(--text-secondary);
            text-align: center;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <!-- OS Boot Sequence Overlay -->
    <div id="boot-screen">
        <div id="boot-text"></div>
    </div>

    <!-- Interactive Background -->
    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <!-- Top Control Bar -->
        <div class="top-bar">
            <div class="glyph-stripes">
                <div class="glyph-bar active"></div>
                <div class="glyph-bar active"></div>
                <div class="glyph-bar"></div>
                <div class="glyph-bar"></div>
            </div>
            <button class="theme-switch" onclick="toggleTheme()" id="theme-btn">Light Mode</button>
        </div>

        <div class="matrix-header">OS // KERNEL ACCESS</div>
        <h1 id="app-name">Awaiting...</h1>
        <div class="version-tag" id="app-version">v---</div>

        <div class="widgets-grid">
            <div class="widget">
                <div class="widget-label">Payload Size</div>
                <div class="widget-value" id="file-size">-- MB</div>
            </div>
            <div class="widget">
                <div class="widget-label">Network Status</div>
                <div class="widget-value" style="color: #00ff66;">● SECURE</div>
            </div>
            
            <div class="widget widget-large">
                <div>
                    <div class="widget-label">Direct Link (Mobile)</div>
                    <p style="font-size: 0.8rem; color: var(--text-secondary);">Scan matrix code to initialize transfer.</p>
                </div>
                <div class="qr-wrapper"><div id="qrcode"></div></div>
            </div>
        </div>

        <a href="#" id="download-link" class="download-btn">Execute Download</a>

        <!-- Live Terminal Changelog -->
        <div class="console-window">
            <div class="console-header">ROOT@DEPLOYMENT:~/CHANGELOG$</div>
            <span id="terminal-text"></span><span class="cursor-blink"></span>
        </div>

        <footer>[ END OF LINE ]</footer>
    </div>

    <script>
        // CONFIGURATION UPDATED HERE
        const GITHUB_USERNAME = 'jawedasfar1-commits'; 
        const REPO_NAME = 'VERTEX'; 

        // 1. Boot Sequence Logic
        const bootScreen = document.getElementById('boot-screen');
        const bootText = document.getElementById('boot-text');
        const bootLines = [
            "NOTHING OS BIOS (C) 2026",
            "INITIALIZING KERNEL MODULES... OK",
            "MOUNTING VIRTUAL FILE SYSTEM... OK",
            "ESTABLISHING SECURE CONNECTION TO GITHUB API...",
            "BYPASSING SECURITY PROTOCOLS... DONE",
            "LAUNCHING USER INTERFACE..."
        ];

        let lineIndex = 0;
        function playBootSequence() {
            if (lineIndex < bootLines.length) {
                bootText.innerHTML += bootLines[lineIndex] + "<br>";
                lineIndex++;
                setTimeout(playBootSequence, Math.random() * 300 + 100);
            } else {
                setTimeout(() => {
                    bootScreen.style.opacity = '0';
                    setTimeout(() => bootScreen.style.visibility = 'hidden', 500);
                    fetchLatestRelease(); 
                }, 600);
            }
        }
        playBootSequence();

        // 2. Theme Toggle Logic
        let isLightMode = false;
        function toggleTheme() {
            isLightMode = !isLightMode;
            document.body.classList.toggle('light-mode');
            document.getElementById('theme-btn').innerText = isLightMode ? "Dark Mode" : "Light Mode";
            updateCanvasColors();
        }

        // 3. GitHub API & Terminal Typing Logic
        async function fetchLatestRelease() {
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/releases/latest`);
                if (!response.ok) throw new Error('Repo not found');
                
                const data = await response.json();
                document.getElementById('app-name').innerText = REPO_NAME;
                document.getElementById('app-version').innerText = data.tag_name;

                const apkAsset = data.assets.find(asset => asset.name.endsWith('.apk'));
                let downloadUrl = data.html_url;

                if (apkAsset) {
                    downloadUrl = apkAsset.browser_download_url;
                    document.getElementById('file-size').innerText = (apkAsset.size / (1024 * 1024)).toFixed(1) + ' MB';
                }

                document.getElementById('download-link').href = downloadUrl;

                new QRCode(document.getElementById("qrcode"), {
                    text: downloadUrl,
                    width: 64, height: 64,
                    colorDark : "#000000", colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.M
                });

                document.querySelectorAll('.glyph-bar').forEach(bar => bar.classList.add('active'));

                let rawNotes = data.body ? data.body.replace(/[*#-]/g, '').trim() : "System patched successfully.";
                typeTerminalText("> " + rawNotes.substring(0, 150) + "..."); 

            } catch (error) {
                document.getElementById('app-name').innerText = 'SYS_ERROR';
                typeTerminalText("> FATAL ERROR: Unable to establish handshake with deployment server. Check repository config.");
            }
        }

        function typeTerminalText(text) {
            const el = document.getElementById('terminal-text');
            el.innerHTML = "";
            let i = 0;
            function typeWriter() {
                if (i < text.length) {
                    el.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(typeWriter, Math.random() * 30 + 10);
                }
            }
            typeWriter();
        }

        // 4. Interactive Matrix Canvas Logic (Theme-Aware)
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let mouse = { x: undefined, y: undefined };
        
        let baseColor, highlightColor;
        function updateCanvasColors() {
            const style = getComputedStyle(document.body);
            baseColor = style.getPropertyValue('--canvas-base').trim();
            highlightColor = style.getPropertyValue('--canvas-highlight').trim();
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            updateCanvasColors();
        }
        
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
        resizeCanvas();

        function drawGrid() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const space = 26; 
            for (let x = 0; x < canvas.width; x += space) {
                for (let y = 0; y < canvas.height; y += space) {
                    let dotRadius = 1;
                    if (mouse.x !== undefined && mouse.y !== undefined) {
                        const dist = Math.hypot(x - mouse.x, y - mouse.y);
                        if (dist < 100) dotRadius = 2.5 * (1 - dist / 100);
                    }
                    ctx.beginPath();
                    ctx.arc(x, y, dotRadius, 0, Math.PI * 2);
                    ctx.fillStyle = dotRadius > 1 ? highlightColor : baseColor;
                    ctx.fill();
                }
            }
            requestAnimationFrame(drawGrid);
        }
        drawGrid();
    </script>
</body>
</html>
